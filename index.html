<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />
    <title>MUONS | Official Portal</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700&family=JetBrains+Mono:wght@300;400;600&family=Poppins:wght@400;600&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-carbon: #010103;
            --accent-cyan: #11CDEF;
            --text-main: #ffffff;
            --text-muted: rgba(245,247,255,0.6);
            --hdr-h: 84px;
        }

        body, html {
            margin: 0; padding: 0;
            background-color: var(--bg-carbon);
            color: var(--text-main);
            font-family: 'Poppins', sans-serif;
            overflow-x: hidden;
        }

        /* --- HEADER FIX --- */
        #muons-header {
            position: fixed; top: 0; width: 100%; z-index: 9999;
            background: rgba(1, 1, 3, 0.8);
            backdrop-filter: blur(15px);
            border-bottom: 1px solid rgba(17, 205, 239, 0.2);
        }

        .mh-wrap {
            height: var(--hdr-h);
            display: flex; align-items: center; padding: 0 5%;
        }

        .mh-inner { display: flex; width: 100%; justify-content: space-between; align-items: center; }
        
        .mh-brand {
            display: flex; align-items: center; gap: 12px;
            text-decoration: none; font-family: 'Orbitron', sans-serif;
            color: var(--accent-cyan); letter-spacing: 2px;
        }

        .mh-logo-img { height: 35px; border-radius: 4px; }

        .mh-nav { display: flex; gap: 25px; list-style: none; margin: 0; padding: 0; }
        .mh-link {
            text-decoration: none; color: var(--text-muted);
            font-size: 0.85rem; font-weight: 600; text-transform: uppercase; transition: 0.3s;
        }
        .mh-link:hover { color: var(--accent-cyan); }

        /* --- HERO GRADIENT FIX --- */
        .muons-hero-wrapper {
            position: relative;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background-color: var(--bg-carbon);
            /* This is the gradient that was "missing" */
            background-image:
                radial-gradient(circle at 20% 30%, rgba(0, 170, 255, 0.25) 0, transparent 40%),
                radial-gradient(circle at 80% 70%, rgba(0, 0, 135, 0.4) 0, transparent 40%);
            background-size: 200% 200%;
            animation: muonsBgMove 12s ease-in-out infinite alternate;
        }

        @keyframes muonsBgMove {
            0% { background-position: 0% 0%; }
            100% { background-position: 100% 100%; }
        }

        .muons-hero-inner {
            text-align: center;
            z-index: 10;
            padding-top: var(--hdr-h); /* Pushes text away from header */
        }

        .muons-hero-title {
            font-family: 'Orbitron', sans-serif;
            font-size: clamp(3.5rem, 12vw, 6rem);
            font-weight: 700;
            letter-spacing: 0.4em;
            margin: 0;
            color: var(--text-main) !important;
            text-shadow: 0 0 20px rgba(0, 170, 255, 0.5);
        }

        .muons-hero-subtitle {
            font-family: 'JetBrains Mono', monospace;
            font-size: clamp(0.7rem, 2vw, 1rem);
            letter-spacing: 0.3em;
            text-transform: uppercase;
            color: var(--accent-cyan);
            margin-top: 10px;
        }

        @media (max-width: 768px) { .mh-nav { display: none; } }
    </style>
</head>
<body>

<header id="muons-header">
    <div class="mh-wrap">
        <div class="mh-inner">
            <a href="#" class="mh-brand">
                <img src="https://muons.rf.gd/wp-content/uploads/2025/08/BG-1.png" alt="Logo" class="mh-logo-img">
                <span>MUONS</span>
            </a>
            <nav>
                <ul class="mh-nav">
                    <li><a class="mh-link" href="#">Home</a></li>
                    <li><a class="mh-link" href="#">Victories</a></li>
                    <li><a class="mh-link" href="#">Technical</a></li>
                    <li><a class="mh-link" href="#">Profile</a></li>
                </ul>
            </nav>
        </div>
    </div>
</header>

<div class="muons-hero-wrapper">
    <div class="muons-hero-inner">
        <h1 class="muons-hero-title">MUONS</h1>
        <div class="muons-hero-subtitle">Media Unit Of Negombo Southernians</div>
    </div>
</div>

</body>
</html>
