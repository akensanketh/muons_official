<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />
    <title>MUONS | Official Portal</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700&family=JetBrains+Mono:wght@300;400;600&family=Poppins:wght@400;600&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-carbon: #010103;
            --accent-cyan: #11CDEF;
            --text-main: #f5f7ff;
            --text-muted: rgba(245,247,255,0.7);
            --hdr-h: 84px;
        }

        body, html {
            margin: 0;
            padding: 0;
            background-color: var(--bg-carbon);
            color: var(--text-main);
            font-family: 'Poppins', sans-serif;
            overflow-x: hidden;
        }

        /* --- PROFESSIONAL HEADER STYLES --- */
        #muons-header {
            position: fixed;
            top: 0;
            width: 100%;
            z-index: 9999;
            transition: transform 0.3s ease;
        }

        .mh-wrap {
            background: rgba(1, 1, 3, 0.85);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid rgba(17, 205, 239, 0.15);
            height: var(--hdr-h);
            display: flex;
            align-items: center;
            padding: 0 5%;
            transition: all 0.3s ease;
        }

        .header-hidden { transform: translateY(-100%); }
        .scrolled .mh-wrap { height: 65px; background: rgba(1, 1, 3, 0.95); }

        .mh-inner {
            display: flex;
            width: 100%;
            justify-content: space-between;
            align-items: center;
        }

        .mh-brand {
            display: flex;
            align-items: center;
            gap: 12px;
            text-decoration: none;
            font-family: 'Orbitron', sans-serif;
            color: var(--accent-cyan);
            letter-spacing: 2px;
        }

        .mh-logo-img { height: 40px; border-radius: 8px; }

        .mh-nav {
            display: flex;
            gap: 30px;
            list-style: none;
            margin: 0;
            padding: 0;
        }

        .mh-link {
            text-decoration: none;
            color: var(--text-muted);
            font-size: 0.9rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: color 0.3s;
        }

        .mh-link:hover { color: var(--accent-cyan); }

        /* --- HERO SECTION --- */
                .muons-hero-wrapper {
            position: relative;
            min-height: 100vh;
            width: 100%;
            font-family: 'JetBrains Mono', monospace;
            color: var(--text-main);
            overflow: hidden;
            background-color: var(--bg-carbon);
            /* Triple-layer gradient for deep Cyberpunk feel */
            background-image:
                radial-gradient(circle at 0% 0%, rgba(0, 170, 255, 0.35) 0, transparent 50%),
                radial-gradient(circle at 100% 100%, rgba(0, 0, 135, 0.8) 0, transparent 55%),
                radial-gradient(circle at 100% 0%, rgba(0, 50, 140, 0.6) 0, transparent 55%);
            background-size: 200% 200%;
            animation: muonsBgMove 15s ease-in-out infinite alternate;
        }

        
            50% { background-position: 50% 30%, 60% 80%, 20% 20%; }
            100% { background-position: 100% 0%, 0% 100%, 0% 0%; }
        }

        .muons-hero-title {
            font-family: 'Orbitron', sans-serif;
            font-size: clamp(3rem, 8vw, 5rem);
            letter-spacing: 0.3em;
            margin-bottom: 0.5rem;
            color: var(--text-main);
        }

        @media (max-width: 768px) {
            .mh-nav { display: none; }
        }
    </style>
</head>
<body>

<header id="muons-header">
    <div class="mh-wrap">
        <div class="mh-inner">
            <a href="#" class="mh-brand">
                <img src="https://muons.rf.gd/wp-content/uploads/2025/08/BG-1.png" alt="Logo" class="mh-logo-img">
                <span>MUONS</span>
            </a>

            <nav>
                <ul class="mh-nav">
                    <li><a class="mh-link" href="#">Home</a></li>
                    <li><a class="mh-link" href="#">Victories</a></li>
                    <li><a class="mh-link" href="#">Technical</a></li>
                    <li><a class="mh-link" href="#">Profile</a></li>
                </ul>
            </nav>
            
            <div style="width: 40px;" class="d-none d-lg-block"></div> 
        </div>
    </div>
</header>

<div class="muons-hero-wrapper">
    <div class="muons-hero-inner">
        <h1 class="muons-hero-title">MUONS</h1>
        <div style="font-size: 0.9rem; letter-spacing: 0.2em; color: var(--text-muted);">
            MEDIA UNIT OF NEGOMBO SOUTHERNIANS
        </div>
    </div>
</div>

<script>
    const header = document.getElementById('muons-header');
    let lastScroll = 0;

    window.addEventListener('scroll', () => {
        const currentScroll = window.pageYOffset;
        if (currentScroll > 50) { header.classList.add('scrolled'); } 
        else { header.classList.remove('scrolled'); }

        if (currentScroll > lastScroll && currentScroll > 100) {
            header.classList.add('header-hidden');
        } else {
            header.classList.remove('header-hidden');
        }
        lastScroll = currentScroll;
    });
</script>

</body>
</html>
